services:
  loopguard:
    build: .
    ports:
      - "${LOOPGUARD_HTTP_PORT:-8080}:8080"
    environment:
      LOOPGUARD_HTTP_ADDR: ":8080"
      LOOPGUARD_DB_DSN: "${LOOPGUARD_DB_DSN}"
      LOOPGUARD_JWT_SECRET: "${LOOPGUARD_JWT_SECRET}"
      LOOPGUARD_BASE_URL: "${LOOPGUARD_BASE_URL:-http://localhost:8080}"
      LOOPGUARD_EXECUTOR_TYPE: "process"
      LOOPGUARD_WORKSPACE_DIR: "/app/workspace"
    volumes:
      - workspace:/app/workspace
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-loopguard}"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb_buffer_pool_size=256M
      --max_connections=50
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

volumes:
  mysql_data:
  workspace:
